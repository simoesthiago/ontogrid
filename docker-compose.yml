services:
  api:
    build:
      context: ./src/backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - timescaledb
      - neo4j
      - redis

  frontend:
    build:
      context: ./src/frontend
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - api

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME}/${NEO4J_PASSWORD}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  timescaledb_data:
  neo4j_data:
  redis_data:
